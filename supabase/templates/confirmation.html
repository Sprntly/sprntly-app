<!--
  Supabase "confirmation" email (signup email confirmation).
  Variables: {{ .ConfirmationURL }}, {{ .Email }}, {{ .SiteURL }}, {{ .Token }}.
-->
<div style="font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;max-width:480px;margin:0 auto;padding:32px 24px;color:#1a1a1a">
  <h1 style="font-size:20px;font-weight:600;margin:0 0 12px">Confirm your email</h1>
  <p style="font-size:15px;line-height:1.5;color:#444;margin:0 0 24px">
    Thanks for signing up for Sprntly. Confirm your email address to activate your account.
  </p>
  <a href="{{ .ConfirmationURL }}"
     style="display:inline-block;background:#1a1a1a;color:#fff;text-decoration:none;font-size:15px;font-weight:500;padding:12px 24px;border-radius:8px">
    Confirm email
  </a>
  <p style="font-size:13px;line-height:1.5;color:#888;margin:24px 0 0">
    If the button doesn't work, copy and paste this link:<br>
    <a href="{{ .ConfirmationURL }}" style="color:#555;word-break:break-all">{{ .ConfirmationURL }}</a>
  </p>
  <p style="font-size:12px;color:#aaa;margin:24px 0 0">
    If you didn't create a Sprntly account, you can safely ignore this email.
  </p>
</div>
