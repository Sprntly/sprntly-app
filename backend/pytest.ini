[pytest]
testpaths = tests
addopts = -q --strict-markers
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    # Background async warming tasks may outlive their test's tmp DB; harmless.
    ignore::pytest.PytestUnraisableExceptionWarning
markers =
    integration: tests that hit the real network or filesystem more than tmp_path
    realbuild: real `vite build` subprocess (full generate→build); excluded from the per-PR lane, run post-merge on the build-path-filtered realbuild workflow + manual dispatch.
