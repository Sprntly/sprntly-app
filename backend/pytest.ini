[pytest]
testpaths = tests
addopts = -q --strict-markers
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    # Background async warming tasks may outlive their test's tmp DB; harmless.
    ignore::pytest.PytestUnraisableExceptionWarning
markers =
    integration: tests that hit the real network or filesystem more than tmp_path
    real_build: spawns a real `npx vite`/`npx tsc` subprocess (CPU-heavy). CI runs
        these in a dedicated SEQUENTIAL step (-m real_build) isolated from the rest
        of the suite so the 2-vCPU runner never starves the build → no SIGKILL
        flake. The main integration step runs -m "not real_build". Both on every PR.
