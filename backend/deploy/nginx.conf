# Port 80: serve Let's Encrypt HTTP-01 challenges in-place, otherwise
# redirect everything to HTTPS. Shared by every hostname we serve from
# this box (api / app / demo). certbot edits the matching 443 server
# block per-domain; the 80 block stays a generic redirect.
server {
    listen 80;
    listen [::]:80;
    server_name api.sprntly.ai app.sprntly.ai demo.sprntly.ai api.demo.sprntly.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS termination. Cert is managed by certbot
# (authenticator=nginx, see /etc/letsencrypt/renewal/api.sprntly.ai.conf).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.sprntly.ai;

    ssl_certificate     /etc/letsencrypt/live/api.sprntly.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sprntly.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Legacy /demo path → redirect to demo.sprntly.ai (preserves path).
    # The Next app is now built without basePath and served at the root
    # of demo.sprntly.ai (see server block below).
    location ~ ^/demo(/.*)?$ {
        return 301 https://demo.sprntly.ai$1$is_args$args;
    }
    # Legacy short URLs that historically redirected into the /demo app.
    location = /privacy { return 301 https://demo.sprntly.ai/privacy; }
    location = /terms   { return 301 https://demo.sprntly.ai/terms; }

    # DS-Agent chat UI (sprntly-agent.service on 127.0.0.1:8002).
    # Sits ahead of the catch-all `location /` so /agent/... never falls
    # through to the main backend. Larger client_max_body_size for CSV
    # uploads.
    location /agent/ {
        proxy_pass http://127.0.0.1:8002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 600s;
        client_max_body_size 50m;
    }

    # Customer-facing MCP endpoint (sprntly-mcp.service on 127.0.0.1:8003).
    # Canonical public URL: https://api.sprntly.ai/mcp — riding the existing
    # api.sprntly.ai cert means zero DNS/certbot work on the box (a dedicated
    # mcp.sprntly.ai host would need both; see git history if we ever cut
    # over). Streamable HTTP transport — may respond with chunked/SSE-style
    # streaming bodies, so buffering must stay off. No trailing slash on
    # either side: the public path /mcp maps 1:1, unstripped, onto FastMCP's
    # default streamable_http_path (/mcp). Backend routes are all /v1/*, so
    # this prefix can't shadow them (/v1/mcp-tokens included).
    location /mcp {
        proxy_pass http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 600s;
    }
}

# demo.sprntly.ai — serves the static Next export at /var/www/sprntly-demo/.
# Replaces the legacy sprntly.ai/demo Vercel rewrite. Once this is live, the
# rewrite block can be removed from sprntlyai_website/vercel.json.
# Cert is a SAN covering both demo.sprntly.ai and app.sprntly.ai (issued
# together by certbot; lives under live/demo.sprntly.ai/).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name demo.sprntly.ai;

    ssl_certificate     /etc/letsencrypt/live/demo.sprntly.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demo.sprntly.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/sprntly-demo;
    try_files $uri $uri/ $uri.html /index.html;
}

# app.sprntly.ai — production Sprntly app (Sprntly/sprntly-app repo).
# Static Next export rsynced to /var/www/sprntly-app/ by the
# deploy-frontend.yml workflow in sprntly-app.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app.sprntly.ai;

    ssl_certificate     /etc/letsencrypt/live/demo.sprntly.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demo.sprntly.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/sprntly-app;
    try_files $uri $uri/ $uri.html /index.html;
    # Design-Agent bundle proxy (Option B / Decision 2 — same-origin serving).
    # `^~` prefix: as the longest match it short-circuits BEFORE the regex `/p/`
    # locations below, so /_da-bundle/* reaches FastAPI while everything else keeps
    # serving the static export via try_files. The trailing slash on proxy_pass
    # strips the prefix: /_da-bundle/v1/design-agent/<...> -> /v1/design-agent/<...>
    # (same FastAPI process api.sprntly.ai proxies to). Keep this target and the
    # bundle_url base baked into the prototype row in lockstep. Full curl-verify
    # recipe + path-rewrite caveat: backend/deploy/da-bundle-proxy.nginx.conf.
    location ^~ /_da-bundle/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Forward grant cookies (da_view_grant / da_share_grant); let Set-Cookie
        # pass back unmodified so it stays first-party to app.sprntly.ai.
        proxy_set_header Cookie            $http_cookie;
        proxy_pass_header Set-Cookie;

        # Stream + Range safety (mirrors the api block's proxy_buffering off):
        # FastAPI StreamingResponse / 206 Range responses flow through unbuffered.
        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_read_timeout      600s;

        # Do NOT add a rewrite that drops the query string (the ?v=<nonce>
        # cache-buster) or normalizes the asset subpath — nested assets/... must
        # reach FastAPI intact; its traversal guard rejects anything unsafe.
    }
    # Design-agent runtime-dynamic routes (1B): serve the exported client
    # shell for any token/id; the client reads the real id from the URL.
    # /p/<company>/<feature>/<token> (canonical, 3-seg), /p/<slug>/<token>
    # (canonical, 2-seg) and /p/<token> (legacy redirect, 1-seg) → SPA shell.
    # Static export emits /p/_/_/_.html (3-seg), /p/_/_.html (2-seg) and
    # /p/_.html (1-seg) sentinels. Regex `~` (NOT `^~`) — a `^~` prefix match
    # would short-circuit before regex evaluation. The three regexes are
    # mutually exclusive by segment count (`[^/]+` cannot match `/`), so order
    # does not affect correctness; listed longest-first for readability.
    location ~ ^/p/[^/]+/[^/]+/[^/]+/?$ { try_files /p/_/_/_.html =404; }
    location ~ ^/p/[^/]+/[^/]+/?$       { try_files /p/_/_.html   =404; }
    location ~ ^/p/[^/]+/?$             { try_files /p/_.html     =404; }
    location ^~ /design/ { try_files /design/_.html =404; }
}

# api.demo.sprntly.ai — demo's own backend (sprintly-demo.service on
# 127.0.0.1:8001). Independent FastAPI process from sprintly.service
# (api.sprntly.ai → 8000); own SQLite DB at /var/lib/sprntly-demo/data/
# and own JWT secret. Source-of-truth code lives in Sprntly/sprntly-demo
# and is checked out at ~/Sprntly-demo on the box.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.demo.sprntly.ai;

    ssl_certificate     /etc/letsencrypt/live/demo.sprntly.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demo.sprntly.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 600s;
        client_max_body_size 50m;
    }
}
