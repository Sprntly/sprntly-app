# Port 80: serve Let's Encrypt HTTP-01 challenges in-place, otherwise
# redirect everything to HTTPS. Shared by every hostname we serve from
# this box (api / app / demo). certbot edits the matching 443 server
# block per-domain; the 80 block stays a generic redirect.
server {
    listen 80;
    listen [::]:80;
    server_name api.sprntly.ai app.sprntly.ai demo.sprntly.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS termination. Cert is managed by certbot
# (authenticator=nginx, see /etc/letsencrypt/renewal/api.sprntly.ai.conf).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.sprntly.ai;

    ssl_certificate     /etc/letsencrypt/live/api.sprntly.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sprntly.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Static export of the /demo Next app. Bundle is rsynced to
    # /var/www/sprntly-demo/ by the deploy-frontend.yml workflow.
    location /demo/ {
        alias /var/www/sprntly-demo/;
        try_files $uri $uri/ $uri.html /demo/index.html;
    }
    # Legacy short URLs that historically redirected into the /demo app
    # (the static export is built with basePath=/demo).
    location = /privacy { return 301 /demo/privacy; }
    location = /terms   { return 301 /demo/terms; }

    # DS-Agent chat UI (sprntly-agent.service on 127.0.0.1:8002).
    # Sits ahead of the catch-all `location /` so /agent/... never falls
    # through to the main backend. Larger client_max_body_size for CSV
    # uploads.
    location /agent/ {
        proxy_pass http://127.0.0.1:8002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 600s;
        client_max_body_size 50m;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 600s;
    }
}

# demo.sprntly.ai — serves the static Next export at /var/www/sprntly-demo/.
# Replaces the legacy sprntly.ai/demo Vercel rewrite. Once this is live, the
# rewrite block can be removed from sprntlyai_website/vercel.json.
# Cert is a SAN covering both demo.sprntly.ai and app.sprntly.ai (issued
# together by certbot; lives under live/demo.sprntly.ai/).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name demo.sprntly.ai;

    ssl_certificate     /etc/letsencrypt/live/demo.sprntly.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demo.sprntly.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/sprntly-demo;
    try_files $uri $uri/ $uri.html /index.html;
}

# app.sprntly.ai — reserved for the upcoming product frontend.
# Returns a placeholder until the frontend ships. Swap the location /
# block for `root` (static export) or `proxy_pass` (Node/Next server)
# when ready. Cert + DNS already in place so cutover is zero-downtime.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app.sprntly.ai;

    ssl_certificate     /etc/letsencrypt/live/demo.sprntly.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demo.sprntly.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        add_header Content-Type "text/html; charset=utf-8";
        return 200 '<!DOCTYPE html><meta charset=utf-8><title>Sprntly</title><body style="font:16px system-ui;padding:60px;max-width:560px;margin:0 auto;color:#14171A"><h1 style="font-size:1.4rem;font-weight:600">app.sprntly.ai</h1><p style="color:#6B7280">The Sprntly product frontend will deploy here.<br>Backend API: <a href="https://api.sprntly.ai">api.sprntly.ai</a> · Marketing site: <a href="https://sprntly.ai">sprntly.ai</a></p></body>';
    }
}
