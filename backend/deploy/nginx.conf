# Port 80: serve Let's Encrypt HTTP-01 challenges in-place, otherwise
# redirect everything to HTTPS. (The original config terminated TLS too;
# this restores it after a deploy regression that left only port 80.)
server {
    listen 80;
    listen [::]:80;
    server_name api.sprntly.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS termination. Cert is managed by certbot
# (authenticator=nginx, see /etc/letsencrypt/renewal/api.sprntly.ai.conf).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.sprntly.ai;

    ssl_certificate     /etc/letsencrypt/live/api.sprntly.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sprntly.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Static export of the /demo Next app. Bundle is rsynced to
    # /var/www/sprntly-demo/ by the deploy-frontend.yml workflow.
    location /demo/ {
        alias /var/www/sprntly-demo/;
        try_files $uri $uri/ $uri.html /demo/index.html;
    }
    # Legacy short URLs that historically redirected into the /demo app
    # (the static export is built with basePath=/demo).
    location = /privacy { return 301 /demo/privacy; }
    location = /terms   { return 301 /demo/terms; }

    # DS-Agent chat UI (sprntly-agent.service on 127.0.0.1:8002).
    # Sits ahead of the catch-all `location /` so /agent/... never falls
    # through to the main backend. Larger client_max_body_size for CSV
    # uploads.
    location /agent/ {
        proxy_pass http://127.0.0.1:8002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 600s;
        client_max_body_size 50m;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 600s;
    }
}
