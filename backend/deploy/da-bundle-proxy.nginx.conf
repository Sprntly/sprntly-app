# =============================================================================
# Design-Agent bundle proxy — nginx deliverable (Option B, Decision 2:
# same-origin serving). NOT auto-applied; this is a copy-paste snippet for the
# operator to paste into the LIVE nginx config on the box.
#
# WHERE THIS MOUNTS
# -----------------
# Paste the `location ^~ /_da-bundle/ { ... }` block below INTO the existing
# `app.sprntly.ai` HTTPS server block in `backend/deploy/nginx.conf` (the
# `server { ... server_name app.sprntly.ai; ... }` block — `root
# /var/www/sprntly-app;` + `try_files`). It MUST sit AHEAD OF the regex `/p/`
# and `^~ /design/` locations in that block, because:
#   - this is a `^~` prefix match, which (when it is the longest matching prefix)
#     short-circuits BEFORE nginx evaluates any regex `location ~ ...`.
#   - placing it above the existing `location ~ ^/p/[^/]+/...` and
#     `location ^~ /design/` lines guarantees `/_da-bundle/*` reaches FastAPI and
#     everything else keeps serving the static Next export via `try_files`.
#
# WHY IT REVERSE-PROXIES TO 127.0.0.1:8000
# ----------------------------------------
# The same nginx box already terminates TLS for api.sprntly.ai and proxies
# `api.sprntly.ai/ -> http://127.0.0.1:8000` (the `location / { proxy_pass
# http://127.0.0.1:8000; ... }` block in the `server_name api.sprntly.ai;`
# server). The Design-Agent bundle routes live on that SAME FastAPI process
# (`/v1/design-agent/...`), so serving them under `app.sprntly.ai/_da-bundle/`
# makes the prototype iframe SAME-ORIGIN to the app parent (`app.sprntly.ai`).
# That restores `iframe.contentDocument` access (ManualEditOverlay /
# comment-anchoring) and makes the `da_view_grant` / `da_share_grant` cookies
# first-party to `app.sprntly.ai`.
#
# The proxy_pass settings below mirror the existing `api.sprntly.ai` `location /`
# block (Host / X-Real-IP / X-Forwarded-For / X-Forwarded-Proto, `proxy_buffering
# off`, `proxy_read_timeout 600s`) and add the streaming/Range + cookie + encoded
# -path guarantees the bundle proxy needs.
# =============================================================================

location ^~ /_da-bundle/ {
    # Strip the `/_da-bundle` prefix and forward the remainder verbatim to
    # FastAPI's `/v1/design-agent/...` mount. The TRAILING SLASH on proxy_pass is
    # load-bearing: with `^~ /_da-bundle/` it rewrites
    #   /_da-bundle/v1/design-agent/<...>  ->  /v1/design-agent/<...>
    # so the public URL is app.sprntly.ai/_da-bundle/v1/design-agent/<...> and the
    # bundle_url base baked into the row (the no-bypass migration) must match.
    proxy_pass http://127.0.0.1:8000/;

    proxy_http_version 1.1;

    # Preserve the public host so Set-Cookie first-party semantics and any
    # self-referential URL building see app.sprntly.ai, not 127.0.0.1. (Matches
    # the api.sprntly.ai `location /` block.)
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # Forward the grant cookies (da_view_grant / da_share_grant) to FastAPI.
    # nginx forwards request headers (incl. Cookie) by default on proxy_pass;
    # this is explicit for clarity and to survive any future header-clearing.
    proxy_set_header Cookie            $http_cookie;
    # Let Set-Cookie from FastAPI pass back unmodified (first-party to app origin).
    proxy_pass_header Set-Cookie;

    # Streaming + Range safety: do NOT buffer, so FastAPI's StreamingResponse and
    # 206 Range responses flow through unbuffered (matches the api block's
    # `proxy_buffering off`). Range / Content-Range / Accept-Ranges pass through.
    proxy_buffering         off;
    proxy_request_buffering off;
    proxy_read_timeout      600s;

    # IMPORTANT: do NOT add any rewrite that drops the query string — the frontend
    # appends a `?v=<nonce>` cache-buster on a rebuilt bundle, and the asset path
    # may contain percent-encoded segments (nested `assets/...`). A prefix
    # proxy_pass forwards the raw remainder + query by default; do not enable
    # `merge_slashes` collapsing or a `rewrite` that would normalize the asset
    # subpath. The FastAPI traversal guard rejects anything unsafe, but legitimate
    # nested `assets/...` paths must reach it intact.
}

# =============================================================================
# CURL VERIFY (run from the box, or any host that resolves app.sprntly.ai).
# Requires DESIGN_AGENT_ENABLED=1 + DESIGN_AGENT_TOKEN_SECRET set on the FastAPI
# process. Substitute <PID> / <CID> / <TOKEN> / <hash> / $BEARER.
# =============================================================================
#
# 1) Authed: mint a grant (bearer), then fetch index.html + a deep asset carrying
#    the cookie.  $BEARER = a valid app session bearer for the OWNING workspace.
#
#   curl -sS -i -c /tmp/da.jar \
#     -X POST "https://app.sprntly.ai/_da-bundle/v1/design-agent/<PID>/view-grant" \
#     -H "Authorization: Bearer $BEARER"
#   # expect: HTTP/2 204
#   #   + Set-Cookie: da_view_grant=...; Path=/_da-bundle/v1/design-agent/<PID>/bundle; HttpOnly; Secure; SameSite=Lax
#
#   curl -sS -i -b /tmp/da.jar \
#     "https://app.sprntly.ai/_da-bundle/v1/design-agent/<PID>/bundle/index.html"
#   # expect: 200, Content-Type: text/html; charset=utf-8
#
#   curl -sS -i -b /tmp/da.jar \
#     "https://app.sprntly.ai/_da-bundle/v1/design-agent/<PID>/bundle/assets/index-<hash>.js?v=123"
#   # expect: 200, Content-Type: text/javascript  (query string + deep path preserved)
#
# 2) Range safety:
#   curl -sS -i -b /tmp/da.jar -H "Range: bytes=0-99" \
#     "https://app.sprntly.ai/_da-bundle/v1/design-agent/<PID>/bundle/assets/index-<hash>.js"
#   # expect: 206 + Content-Range + Accept-Ranges
#
# 3) No grant -> 401; traversal -> 404:
#   curl -sS -i \
#     "https://app.sprntly.ai/_da-bundle/v1/design-agent/<PID>/bundle/index.html"            # 401
#   curl -sS -i -b /tmp/da.jar \
#     "https://app.sprntly.ai/_da-bundle/v1/design-agent/<PID>/bundle/..%2f..%2fetc/passwd"  # 404
#
# 4) Public token path (no cookie needed):
#   curl -sS -i \
#     "https://app.sprntly.ai/_da-bundle/v1/design-agent/by-token/<TOKEN>/bundle/index.html" # 200 if public/ready
#
# =============================================================================
# PATH-REWRITE CAVEAT (confirm on the box)
# -----------------------------------------
# `proxy_pass http://127.0.0.1:8000/;` (trailing slash) + `^~ /_da-bundle/` strips
# `/_da-bundle/` and forwards the remainder, which must arrive as
# `/v1/design-agent/...`. So the public URL is
# `app.sprntly.ai/_da-bundle/v1/design-agent/...` and the `bundle_url` base baked
# into the prototype row (no-bypass migration) must match THAT exactly. If the
# deploy instead prefers the public URL to omit the `v1/design-agent` segment
# (e.g. `app.sprntly.ai/_da-bundle/<id>/...`), change the target to
# `proxy_pass http://127.0.0.1:8000/v1/design-agent/;` and bake the matching base
# into `bundle_url`. Keep the proxy_pass target and the bundle_url base in lockstep.
#
# Encoded-slash handling: verify `%2F` / encoded segments in the asset path
# survive the proxy (modern nginx forwards the raw request path on a prefix
# proxy_pass without re-decoding). If a hardened nginx build re-encodes, the
# FastAPI traversal guard still rejects unsafe paths — but confirm legitimate
# nested `assets/...` requests return 200.
# =============================================================================
