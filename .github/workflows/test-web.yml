name: Test web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/test-web.yml'
      # The cross-stack contract test (app/lib/__tests__/pipeline-contract.test.ts)
      # reads these backend templates through the real adapters, so a backend-only
      # edit that renames/breaks a `:::block` must run the web suite too.
      - 'backend/data/sprntly_*_template.md'
      - 'backend/data/sprntly_*_sample.md'
      - 'backend/skills/prd-author/templates/prd-template.md'
  # No paths filter on PRs: required checks must run on every PR or the PR gets
  # stuck "pending" (see test-backend.yml). Running the web suite on all PRs also
  # covers the cross-stack contract case (a backend template edit) for free.
  pull_request: {}

jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        working-directory: web
        run: npm ci --no-audit --no-fund
      - name: Typecheck (tsc --noEmit)
        # Fast, standalone type check on the fast lane. `next build` (below) also
        # type-checks, but this fails in seconds on a type regression instead of
        # after a full build, and runs even if the build step is later cached.
        working-directory: web
        run: npm run typecheck
      - name: Vitest
        working-directory: web
        # Defensive headroom: raise the vitest worker's V8 heap above Node's
        # ~2GB default so the growing web suite has margin on the ~7GB
        # ubuntu-latest runner. The actual OOM root cause (an infinite
        # render/effect loop in PrdRightRail.dom.test.tsx) is fixed in the test
        # itself; this bump is cheap insurance, not the fix.
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm test
      - name: Build (smoke)
        working-directory: web
        env:
          NEXT_PUBLIC_API_URL: https://api.sprntly.ai
          NEXT_PUBLIC_GOOGLE_API_KEY: ${{ vars.NEXT_PUBLIC_GOOGLE_API_KEY }}
        run: npm run build
