name: Test web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/test-web.yml'
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/test-web.yml'

jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        working-directory: web
        run: npm ci --no-audit --no-fund
      - name: Vitest
        working-directory: web
        run: npm test
      - name: Build (smoke)
        working-directory: web
        env:
          NEXT_PUBLIC_API_URL: https://api.sprntly.ai
        run: npm run build
