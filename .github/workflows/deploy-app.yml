name: Deploy app (staging + prod)

# Dual-target frontend deploy. Builds the static Next export and rsyncs it to
# the environment's web root on EC2, which nginx serves.
#   push to main        -> STAGING  (staging.sprntly.ai, /var/www/sprntly-app-staging/,
#                                     built against https://api.staging.sprntly.ai)
#   push to production  -> PROD     (app.sprntly.ai,     /var/www/sprntly-app/,
#                                     built against https://api.sprntly.ai)
# The app is a STATIC export, so NEXT_PUBLIC_API_URL is baked in at build time —
# staging and prod are genuinely different bundles pointing at different API
# hosts. The Supabase URL/anon key are shared (same project) for now.
# Backend deploys are in deploy-backend.yml; this workflow only touches the
# frontend bundle.

on:
  push:
    branches: [main, production]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-app.yml'
  workflow_dispatch:

concurrency:
  group: deploy-app-${{ github.ref }}
  cancel-in-progress: false

env:
  API_URL:  ${{ github.ref == 'refs/heads/production' && 'https://api.sprntly.ai' || 'https://api.staging.sprntly.ai' }}
  DEST_DIR: ${{ github.ref == 'refs/heads/production' && '/var/www/sprntly-app/' || '/var/www/sprntly-app-staging/' }}
  APP_HOST: ${{ github.ref == 'refs/heads/production' && 'app.sprntly.ai' || 'staging.sprntly.ai' }}
  # Per-branch Supabase project: prod builds against the prod project, staging
  # (main) against the separate dev project (sprntly-dev). The *_DEV secrets hold
  # the dev project's URL + publishable anon key.
  SUPA_URL:  ${{ github.ref == 'refs/heads/production' && secrets.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL_DEV }}
  SUPA_ANON: ${{ github.ref == 'refs/heads/production' && secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY_DEV }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Validate Supabase build secrets
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.SUPA_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.SUPA_ANON }}
        run: |
          url="$(printf '%s' "$NEXT_PUBLIC_SUPABASE_URL" | tr -d '[:space:]')"
          key="$(printf '%s' "$NEXT_PUBLIC_SUPABASE_ANON_KEY" | tr -d '[:space:]')"
          if [ -z "$url" ] || [ -z "$key" ]; then
            echo "::error::Missing NEXT_PUBLIC_SUPABASE_URL or NEXT_PUBLIC_SUPABASE_ANON_KEY in GitHub Actions secrets."
            exit 1
          fi
          case "$url" in
            https://*.supabase.co) ;;
            *)
              echo "::error::NEXT_PUBLIC_SUPABASE_URL must be https://YOUR_PROJECT_REF.supabase.co (got: ${url:0:40}...)"
              exit 1
              ;;
          esac
          case "$key" in
            sb_publishable_*)
              if [ "${#key}" -lt 30 ]; then
                echo "::error::NEXT_PUBLIC_SUPABASE_ANON_KEY publishable key looks truncated."
                exit 1
              fi
              ;;
            eyJ*)
              if [ "${#key}" -lt 100 ]; then
                echo "::error::NEXT_PUBLIC_SUPABASE_ANON_KEY JWT anon key looks truncated."
                exit 1
              fi
              ;;
            *)
              echo "::error::NEXT_PUBLIC_SUPABASE_ANON_KEY must be the publishable key (sb_publishable_...) or legacy anon JWT (eyJ...) from Supabase Dashboard → Settings → API keys."
              exit 1
              ;;
          esac

      - name: Build static export (${{ env.APP_HOST }} -> ${{ env.API_URL }})
        env:
          NEXT_PUBLIC_API_URL: ${{ env.API_URL }}
          NEXT_PUBLIC_DESIGN_AGENT_ENABLED: "1"
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.SUPA_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.SUPA_ANON }}
          NEXT_PUBLIC_AUTH_EMAIL_ALLOWLIST: ${{ secrets.NEXT_PUBLIC_AUTH_EMAIL_ALLOWLIST }}
          NEXT_PUBLIC_GOOGLE_API_KEY: ${{ vars.NEXT_PUBLIC_GOOGLE_API_KEY }}
        run: |
          cd web
          npm ci --no-audit --no-fund
          npm run build

      - name: Configure SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync to EC2 (${{ env.DEST_DIR }})
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            web/out/ \
            "$EC2_USER@$EC2_HOST:${DEST_DIR}"

      - name: Smoke test ${{ env.APP_HOST }} (retry up to 15s)
        run: |
          for i in $(seq 1 15); do
            if curl -fsS -o /dev/null "https://${APP_HOST}/"; then
              echo "${APP_HOST} healthy after ${i}s"
              break
            fi
            sleep 1
          done
          curl -fsS -o /dev/null -w "app index:   HTTP %{http_code}\n" "https://${APP_HOST}/"
          curl -fsS -o /dev/null -w "app sign-in: HTTP %{http_code}\n" "https://${APP_HOST}/sign-in"
