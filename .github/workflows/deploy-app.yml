name: Deploy to app.sprntly.ai

# Builds the static Next export and rsyncs it to /var/www/sprntly-app/ on
# EC2, which nginx serves at https://app.sprntly.ai/. Backend deploys are
# in deploy-backend.yml; this workflow only touches the frontend bundle.

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-app.yml'
  workflow_dispatch:

concurrency:
  group: deploy-app
  cancel-in-progress: false

jobs:
  # Backstop gate: run the web suite + typecheck before shipping the bundle, so a
  # red suite or type error can never reach prod even on a direct push to main.
  # Belt-and-braces with the branch-protection required check (test-web.yml).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        working-directory: web
        run: npm ci --no-audit --no-fund
      - name: Typecheck
        working-directory: web
        run: npm run typecheck
      - name: Vitest
        working-directory: web
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Validate Supabase build secrets
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          url="$(printf '%s' "$NEXT_PUBLIC_SUPABASE_URL" | tr -d '[:space:]')"
          key="$(printf '%s' "$NEXT_PUBLIC_SUPABASE_ANON_KEY" | tr -d '[:space:]')"
          if [ -z "$url" ] || [ -z "$key" ]; then
            echo "::error::Missing NEXT_PUBLIC_SUPABASE_URL or NEXT_PUBLIC_SUPABASE_ANON_KEY in GitHub Actions secrets."
            exit 1
          fi
          case "$url" in
            https://*.supabase.co) ;;
            *)
              echo "::error::NEXT_PUBLIC_SUPABASE_URL must be https://YOUR_PROJECT_REF.supabase.co (got: ${url:0:40}...)"
              exit 1
              ;;
          esac
          case "$key" in
            sb_publishable_*)
              if [ "${#key}" -lt 30 ]; then
                echo "::error::NEXT_PUBLIC_SUPABASE_ANON_KEY publishable key looks truncated."
                exit 1
              fi
              ;;
            eyJ*)
              if [ "${#key}" -lt 100 ]; then
                echo "::error::NEXT_PUBLIC_SUPABASE_ANON_KEY JWT anon key looks truncated."
                exit 1
              fi
              ;;
            *)
              echo "::error::NEXT_PUBLIC_SUPABASE_ANON_KEY must be the publishable key (sb_publishable_...) or legacy anon JWT (eyJ...) from Supabase Dashboard → Settings → API keys."
              exit 1
              ;;
          esac

      - name: Build static export
        env:
          NEXT_PUBLIC_API_URL: https://api.sprntly.ai
          NEXT_PUBLIC_DESIGN_AGENT_ENABLED: "1"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_AUTH_EMAIL_ALLOWLIST: ${{ secrets.NEXT_PUBLIC_AUTH_EMAIL_ALLOWLIST }}
          NEXT_PUBLIC_GOOGLE_API_KEY: ${{ vars.NEXT_PUBLIC_GOOGLE_API_KEY }}
        run: |
          cd web
          npm ci --no-audit --no-fund
          npm run build

      - name: Configure SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync to EC2 (/var/www/sprntly-app/)
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            web/out/ \
            "$EC2_USER@$EC2_HOST:/var/www/sprntly-app/"

      - name: Smoke test app.sprntly.ai (retry up to 15s)
        run: |
          for i in $(seq 1 15); do
            if curl -fsS -o /dev/null https://app.sprntly.ai/; then
              echo "app.sprntly.ai healthy after ${i}s"
              break
            fi
            sleep 1
          done
          curl -fsS -o /dev/null -w "app index:   HTTP %{http_code}\n" https://app.sprntly.ai/
          curl -fsS -o /dev/null -w "app sign-in: HTTP %{http_code}\n" https://app.sprntly.ai/sign-in
