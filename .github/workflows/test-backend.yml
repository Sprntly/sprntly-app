name: Test backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/test-backend.yml'
  # No paths filter on PRs: these checks are REQUIRED in branch protection, and a
  # required check that never runs (because a PR didn't touch its paths) leaves
  # the PR stuck "pending" forever. Running on every PR guarantees the check
  # always reports. The fast lane is ~3-4 min; the integration lane still gates
  # itself to PRs→main via its job-level `if`.
  pull_request: {}
  schedule:
    # Nightly full suite (integration lane) — 02:00 UTC
    - cron: '0 2 * * *'

jobs:
  # Fast lane: runs on every PR
  # Skips real vite-build and Node-subprocess tests (~29 tests, ~230s).
  # Completes in ~3-4 minutes. Coverage: all unit + mock tests (~1,378 tests).
  pytest-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dev requirements
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest (fast lane — no integration tests)
        working-directory: backend
        run: python -m pytest tests/ -q --strict-markers -m "not integration"

  # Integration lane: gates merge-to-main + runs nightly
  # Includes real vite builds, real tsc, real Node subprocesses.
  # Runs: (a) on PRs targeting main, (b) on push to main, (c) nightly.
  # Expected duration: ~7-8 minutes (full suite).
  pytest-integration:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dev requirements
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # Node toolchain required for integration tests only.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install @babel/parser for autofixer
        run: npm install --prefix /tmp/babel-deps @babel/parser

      # Cache the prototype-runtime node_modules so the real-build step is ALWAYS
      # warm (it is symlinked into each build dir by storage._symlink_node_modules,
      # never `npm install`-ed per build — see test_vite_build_symlinks_node_modules_not_install).
      # Keyed on the lockfile so a dependency bump busts the cache.
      - name: Cache prototype-runtime node_modules
        id: cache-runtime-nm
        uses: actions/cache@v4
        with:
          path: prototype-runtime/node_modules
          key: prototype-runtime-nm-${{ runner.os }}-node20-${{ hashFiles('prototype-runtime/package-lock.json') }}

      - name: Install prototype-runtime node_modules
        if: steps.cache-runtime-nm.outputs.cache-hit != 'true'
        working-directory: prototype-runtime
        run: npm ci --no-audit --no-fund

      # Step 1 — the bulk of the suite (unit + mock + non-build integration),
      # EXCLUDING the CPU-heavy real-`vite build`/`tsc` tests. Running these first,
      # without the real builds competing, keeps both vCPUs free for step 2.
      - name: Run pytest (full suite, excl. real-build)
        working-directory: backend
        env:
          DESIGN_AGENT_NODE_PATH: /tmp/babel-deps/node_modules
        run: python -m pytest tests/ -v -m "not real_build"

      # Step 2 — the real-`vite build`/`tsc` tests, run SEQUENTIALLY on their own.
      # ROOT-CAUSE FIX for the "vite build timed out" flake: when these ran inside
      # the full `pytest tests/ -v` they competed with ~3,200 other tests for the
      # 2-vCPU GitHub runner; a build, starved of CPU, was SIGKILLed at the timeout
      # (returncode -9 while still transforming) — intermittently, depending on
      # scheduling. Isolated here, each build runs uncontended (~10-15s locally) so
      # the lane is deterministic. Coverage is unchanged — these run on EVERY PR,
      # not quarantined to nightly. The build timeout is pinned generously for CI
      # (read at call-time by storage._vite_build_sync); prod default stays 180s.
      - name: Run pytest (real vite build / tsc — isolated, sequential)
        working-directory: backend
        env:
          DESIGN_AGENT_NODE_PATH: /tmp/babel-deps/node_modules
          DESIGN_AGENT_VITE_BUILD_TIMEOUT_SECONDS: '300'
        run: python -m pytest tests/ -v -m "real_build"
