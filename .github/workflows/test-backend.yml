name: Test backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/test-backend.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/test-backend.yml'

jobs:
  # Fast lane: runs on every PR
  # Skips real vite-build and Node-subprocess tests (~29 tests, ~230s).
  # Completes in ~3-4 minutes. Coverage: all unit + mock tests (~1,378 tests).
  pytest-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dev requirements
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest (fast lane — no integration tests)
        working-directory: backend
        run: python -m pytest tests/ -q --strict-markers -m "not integration"

  # Integration lane: gates merge-to-main.
  # Includes real tsc, babel autofixer, real Node subprocesses —
  # but EXCLUDES the heavy real `vite build` tests (marker: realbuild),
  # which run in the separate `test-backend-realbuild.yml` workflow
  # (post-merge on the build path + manual dispatch only).
  # This keeps per-PR merges off the contended 120s vite cap (~30-min flake).
  # Runs: (a) on PRs targeting main, (b) on push to main.
  pytest-integration:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dev requirements
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # Node toolchain required for integration tests only.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install @babel/parser for autofixer
        run: npm install --prefix /tmp/babel-deps @babel/parser

      - name: Install prototype-runtime node_modules
        working-directory: prototype-runtime
        run: npm ci --no-audit --no-fund

      # Excludes the `realbuild`-marked real `vite build` tests — those run in
      # test-backend-realbuild.yml (post-merge + manual) to keep this PR gate fast.
      - name: Run pytest (integration minus realbuild vite builds)
        working-directory: backend
        env:
          DESIGN_AGENT_NODE_PATH: /tmp/babel-deps/node_modules
        run: python -m pytest tests/ -v -m "integration and not realbuild"
