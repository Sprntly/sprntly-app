name: Test backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/test-backend.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/test-backend.yml'
  schedule:
    # Nightly full suite (integration lane) — 02:00 UTC
    - cron: '0 2 * * *'

jobs:
  # Fast lane: runs on every PR
  # Skips real vite-build and Node-subprocess tests (~29 tests, ~230s).
  # Completes in ~3-4 minutes. Coverage: all unit + mock tests (~1,378 tests).
  pytest-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dev requirements
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest (fast lane — no integration tests)
        working-directory: backend
        run: python -m pytest tests/ -q --strict-markers -m "not integration"

  # Integration lane: gates merge-to-main + runs nightly
  # Includes real vite builds, real tsc, real Node subprocesses.
  # Runs: (a) on PRs targeting main, (b) on push to main, (c) nightly.
  # Expected duration: ~7-8 minutes (full suite).
  pytest-integration:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dev requirements
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # Node toolchain required for integration tests only.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install @babel/parser for autofixer
        run: npm install --prefix /tmp/babel-deps @babel/parser

      - name: Install prototype-runtime node_modules
        working-directory: prototype-runtime
        run: npm ci --no-audit --no-fund

      - name: Run pytest (full suite incl. integration)
        working-directory: backend
        env:
          DESIGN_AGENT_NODE_PATH: /tmp/babel-deps/node_modules
          # The real-vite-build integration tests (test_design_agent_{smoke,storage,
          # scaffold_sync}) run an actual `vite build`. The prod default cap is 120s
          # (a user-facing latency budget), but on a contended GitHub runner a valid
          # build can take longer and get SIGKILLed at 120s (returncode -9) — which
          # flaked the whole lane (e.g. 2026-06-18). Raise the cap for CI only so a
          # slow-but-correct build isn't killed; prod keeps the 120s default.
          DESIGN_AGENT_VITE_BUILD_TIMEOUT_SECONDS: "300"
        run: python -m pytest tests/ -v
