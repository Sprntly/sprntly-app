name: Deploy ds-agent to EC2

on:
  push:
    branches: [main]
    paths:
      - 'ds-agent/**'
      - '.github/workflows/deploy-agent.yml'
  workflow_dispatch:

concurrency:
  group: deploy-agent
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd ~/Sprntly
            git fetch --quiet origin main
            git reset --hard origin/main
            # Persistent upload dir survives `git reset --hard`.
            sudo mkdir -p /var/lib/sprntly-agent/uploads
            sudo chown -R $(whoami):$(whoami) /var/lib/sprntly-agent
            cd ds-agent
            if [ ! -d .venv ]; then
              python3.11 -m venv .venv
            fi
            .venv/bin/pip install -q -e .
            # Keep nginx config in sync — the /agent/ location lives in the
            # same nginx file as the main backend, so we re-apply it here too
            # in case it changed alongside an agent-only PR.
            sudo cp ~/Sprntly/backend/deploy/nginx.conf /etc/nginx/conf.d/sprintly.conf
            sudo nginx -t
            sudo systemctl reload nginx
            # systemd unit may have changed
            sudo cp deploy/sprntly-agent.service /etc/systemd/system/sprntly-agent.service
            sudo systemctl daemon-reload
            sudo systemctl restart sprntly-agent.service
            sleep 3
            curl -fsS http://127.0.0.1:8002/health
            echo "Agent deploy OK: $(git -C ~/Sprntly rev-parse --short HEAD)"
