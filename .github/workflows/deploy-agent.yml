name: Deploy ds-agent (staging + prod)

# Dual-target ds-agent deploy. Its own systemd unit on EC2, served by nginx
# under the api host at /agent/.
#   push to main        -> STAGING  (api.staging.sprntly.ai/agent, ~/Sprntly-staging,
#                                     sprntly-agent-staging.service on :8012)
#   push to production  -> PROD     (api.sprntly.ai/agent,         ~/Sprntly,
#                                     sprntly-agent.service on :8002)
# Lives in sprntly-app only — sprntly-demo does not deploy the agent.

on:
  push:
    branches: [main, production]
    paths:
      - 'ds-agent/**'
      - '.github/workflows/deploy-agent.yml'
  workflow_dispatch:

concurrency:
  group: deploy-agent-${{ github.ref }}
  cancel-in-progress: false

env:
  DEPLOY_BRANCH: ${{ github.ref == 'refs/heads/production' && 'production' || 'main' }}
  CLONE_DIR:     ${{ github.ref == 'refs/heads/production' && 'Sprntly' || 'Sprntly-staging' }}
  SERVICE:       ${{ github.ref == 'refs/heads/production' && 'sprntly-agent' || 'sprntly-agent-staging' }}
  UNIT_FILE:     ${{ github.ref == 'refs/heads/production' && 'sprntly-agent.service' || 'sprntly-agent-staging.service' }}
  PORT:          ${{ github.ref == 'refs/heads/production' && '8002' || '8012' }}
  AGENT_DATA:    ${{ github.ref == 'refs/heads/production' && '/var/lib/sprntly-agent' || '/var/lib/sprntly-agent-staging' }}

jobs:
  # Backstop gate: re-run the ds-agent server tests before deploying, so a red
  # suite can never reach the box even on a direct push to main. Belt-and-braces
  # with the branch-protection required check (test-agent.yml on the PR).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ds-agent/pyproject.toml
      - name: Install ds-agent (with dev extras)
        working-directory: ds-agent
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e '.[dev]'
      - name: Run pytest (server tests)
        working-directory: ds-agent
        run: python -m pytest tests/ -q --strict-markers

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          envs: DEPLOY_BRANCH,CLONE_DIR,SERVICE,UNIT_FILE,PORT,AGENT_DATA
          script: |
            set -e
            echo "Deploying ds-agent branch=$DEPLOY_BRANCH -> ~/$CLONE_DIR ($SERVICE on :$PORT)"
            cd ~/$CLONE_DIR
            git fetch --quiet origin $DEPLOY_BRANCH
            git reset --hard origin/$DEPLOY_BRANCH
            # Persistent upload dir survives `git reset --hard`. Per-env dir so
            # staging uploads never collide with prod.
            sudo mkdir -p $AGENT_DATA/uploads
            sudo chown -R $(whoami):$(whoami) $AGENT_DATA
            cd ds-agent
            if [ ! -d .venv ]; then
              python3.11 -m venv .venv
            fi
            .venv/bin/pip install -q -e .
            # Keep nginx config in sync — the /agent/ location lives in the
            # same nginx file as the main backend, so we re-apply it here too
            # in case it changed alongside an agent-only PR.
            sudo cp ~/$CLONE_DIR/backend/deploy/nginx.conf /etc/nginx/conf.d/sprintly.conf
            sudo nginx -t
            sudo systemctl reload nginx
            # systemd unit may have changed
            sudo cp deploy/$UNIT_FILE /etc/systemd/system/$UNIT_FILE
            sudo systemctl daemon-reload
            sudo systemctl restart $SERVICE.service
            # Wait up to 15s for the agent to bind on the env's port.
            for i in $(seq 1 15); do
              if curl -fsS http://127.0.0.1:$PORT/health >/dev/null 2>&1; then
                echo "$SERVICE healthy after ${i}s"
                break
              fi
              sleep 1
            done
            curl -fsS http://127.0.0.1:$PORT/health
            echo "Agent deploy OK ($SERVICE): $(git -C ~/$CLONE_DIR rev-parse --short HEAD)"
