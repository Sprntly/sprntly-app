name: Deploy mcp (staging + prod)

# Dual-target customer-facing MCP server deploy. Own systemd unit on EC2,
# served by nginx under the api host at /mcp (rides the existing api cert, so
# no extra DNS/certbot beyond the api.staging host the backend already needs).
#   push to main        -> STAGING  (api.staging.sprntly.ai/mcp, ~/Sprntly-staging,
#                                     sprntly-mcp-staging.service on :8013,
#                                     talks to staging backend on :8010)
#   push to production  -> PROD     (api.sprntly.ai/mcp,         ~/Sprntly,
#                                     sprntly-mcp.service on :8003,
#                                     talks to prod backend on :8000)
# Each env gets its own mcp/.env (BACKEND_URL + MCP_ALLOWED_HOSTS differ by
# env; BACKEND_INTERNAL_KEY is read from that env's backend/.env on the box —
# staging's backend/.env is a symlink to prod's, so the key matches). Keys are
# only ADDED if missing, so manual edits survive.
# Lives in sprntly-app only — sprntly-demo does not deploy it.

on:
  push:
    branches: [main, production]
    paths:
      - 'mcp/**'
      - '.github/workflows/deploy-mcp.yml'
  workflow_dispatch:

concurrency:
  group: deploy-mcp-${{ github.ref }}
  cancel-in-progress: false

env:
  DEPLOY_BRANCH: ${{ github.ref == 'refs/heads/production' && 'production' || 'main' }}
  CLONE_DIR:     ${{ github.ref == 'refs/heads/production' && 'Sprntly' || 'Sprntly-staging' }}
  SERVICE:       ${{ github.ref == 'refs/heads/production' && 'sprntly-mcp' || 'sprntly-mcp-staging' }}
  UNIT_FILE:     ${{ github.ref == 'refs/heads/production' && 'sprntly-mcp.service' || 'sprntly-mcp-staging.service' }}
  PORT:          ${{ github.ref == 'refs/heads/production' && '8003' || '8013' }}
  BACKEND_URL:   ${{ github.ref == 'refs/heads/production' && 'http://127.0.0.1:8000' || 'http://127.0.0.1:8010' }}
  ALLOWED_HOST:  ${{ github.ref == 'refs/heads/production' && 'api.sprntly.ai' || 'api.staging.sprntly.ai' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          envs: DEPLOY_BRANCH,CLONE_DIR,SERVICE,UNIT_FILE,PORT,BACKEND_URL,ALLOWED_HOST
          script: |
            set -e
            echo "Deploying mcp branch=$DEPLOY_BRANCH -> ~/$CLONE_DIR ($SERVICE on :$PORT -> backend $BACKEND_URL)"
            cd ~/$CLONE_DIR
            git fetch --quiet origin $DEPLOY_BRANCH
            git reset --hard origin/$DEPLOY_BRANCH
            cd mcp
            if [ ! -d .venv ]; then
              python3.11 -m venv .venv
            fi
            .venv/bin/pip install -q -e .
            # Bootstrap mcp/.env (the systemd unit hard-requires it via
            # EnvironmentFile=). Keys are only ADDED if missing — existing
            # values are never overwritten, so this is safe on every deploy.
            ENV_FILE=~/$CLONE_DIR/mcp/.env
            touch "$ENV_FILE"
            chmod 600 "$ENV_FILE"
            ensure() {
              grep -q "^$1=" "$ENV_FILE" || echo "$1=$2" >> "$ENV_FILE"
            }
            # The internal key must equal the backend's INTERNAL_API_KEY — read
            # it from this env's backend/.env on the box (staging's is a symlink
            # to prod's, so the value is identical).
            INTERNAL_KEY=$(grep '^INTERNAL_API_KEY=' ~/$CLONE_DIR/backend/.env | head -1 | cut -d= -f2-)
            if [ -z "$INTERNAL_KEY" ] && ! grep -q '^BACKEND_INTERNAL_KEY=' "$ENV_FILE"; then
              echo "FATAL: INTERNAL_API_KEY not found in ~/$CLONE_DIR/backend/.env and" >&2
              echo "BACKEND_INTERNAL_KEY not already set in mcp/.env — token resolve" >&2
              echo "cannot work. Add INTERNAL_API_KEY to backend/.env first." >&2
              exit 1
            fi
            ensure BACKEND_URL "$BACKEND_URL"
            ensure BACKEND_INTERNAL_KEY "$INTERNAL_KEY"
            # nginx proxies with Host: <api host>; allow it through the SDK's
            # DNS-rebinding protection (default is localhost-only).
            ensure MCP_ALLOWED_HOSTS "$ALLOWED_HOST"
            # The Settings UI hands out connector URLs with the token embedded
            # as ?token=..., so the URL-token fallback must be on.
            ensure MCP_ALLOW_URL_TOKEN "1"
            # Keep nginx config in sync — the /mcp location lives in the same
            # nginx file as the main backend.
            sudo cp ~/$CLONE_DIR/backend/deploy/nginx.conf /etc/nginx/conf.d/sprintly.conf
            sudo nginx -t
            sudo systemctl reload nginx
            # systemd unit may have changed; enable so it survives reboots
            sudo cp deploy/$UNIT_FILE /etc/systemd/system/$UNIT_FILE
            sudo systemctl daemon-reload
            sudo systemctl enable $SERVICE.service
            sudo systemctl restart $SERVICE.service
            # Wait up to 15s for the service to bind on the env's port.
            for i in $(seq 1 15); do
              if curl -fsS http://127.0.0.1:$PORT/health >/dev/null 2>&1; then
                echo "$SERVICE healthy after ${i}s"
                break
              fi
              sleep 1
            done
            curl -fsS http://127.0.0.1:$PORT/health
            echo "MCP deploy OK ($SERVICE): $(git -C ~/$CLONE_DIR rev-parse --short HEAD)"
