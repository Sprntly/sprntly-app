name: Deploy frontend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build static export
        env:
          NEXT_PUBLIC_API_URL: https://api.sprntly.ai
          NEXT_PUBLIC_BASE_PATH: /demo
        run: |
          cd web
          npm ci --no-audit --no-fund
          npm run build

      - name: Configure SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync to EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            web/out/ \
            "$EC2_USER@$EC2_HOST:/var/www/sprntly-demo/"

      - name: Smoke test
        run: |
          curl -fsS -o /dev/null -w "demo index: HTTP %{http_code}\n" https://api.sprntly.ai/demo/
          curl -fsS -o /dev/null -w "demo sign-in: HTTP %{http_code}\n" https://api.sprntly.ai/demo/sign-in
