name: Deploy backend to api.sprntly.ai

# SSHes to EC2, fast-forwards ~/Sprntly to origin/main (the on-box clone
# tracks Sprntly/sprntly-app, where the canonical backend lives), pip-installs,
# and restarts sprintly.service. Demo backend changes do NOT go through here —
# only sprntly-app deploys the backend.
#
# Schema safety (added after a prod incident): a `migrate` job applies any
# pending Supabase migrations BEFORE the backend restarts, so code can never go
# live against a schema that's missing its tables. Prod migrations used to be
# applied by hand, which silently drifted and broke a feature (multi_agent_docs
# / ticket / drip tables were missing). The migration history was baselined
# (all existing migrations marked applied) so `db push` only applies NEW ones.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'supabase/migrations/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  # Apply pending DB migrations first. Gates the deploy: if a migration fails,
  # the backend is NOT restarted onto code that needs it.
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Apply pending Supabase migrations (db push)
        env:
          # Session-mode pooler connection string from the Supabase dashboard
          # (Settings → Database → Connection pooling → Mode: Session). The
          # GitHub runner is IPv4-only, so the IPv6 direct host can't be used —
          # the pooler is the IPv4 path. Stored as a repo/org secret.
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::warning title=Migrations skipped::SUPABASE_DB_URL secret is not set — pending migrations were NOT applied. Add the Session-mode pooler connection string from the Supabase dashboard to enable auto-apply. Until then, prod schema can drift."
            exit 0
          fi
          # --yes: non-interactive. db push compares against the baselined
          # migration history and applies only migrations not yet recorded.
          supabase db push --db-url "$SUPABASE_DB_URL" --yes

  deploy:
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd ~/Sprntly
            git fetch --quiet origin main
            git reset --hard origin/main
            # Persistent uploads dir lives outside the repo so git resets don't
            # wipe user data. First deploy after the dynamic-datasets PR
            # migrates the existing asurion corpus into place.
            sudo mkdir -p /var/lib/sprntly/data
            sudo chown -R $(whoami):$(whoami) /var/lib/sprntly
            if [ -d ~/Sprntly/backend/data/asurion ] && [ ! -d /var/lib/sprntly/data/asurion ]; then
              cp -R ~/Sprntly/backend/data/asurion /var/lib/sprntly/data/asurion
              echo "Migrated asurion dataset into /var/lib/sprntly/data/"
            fi
            cd backend
            ./.venv/bin/pip install -q -r requirements.txt
            sudo /bin/systemctl restart sprintly
            # Wait up to 15s for FastAPI to bind. Avoids races when two deploys
            # restart the service close together.
            for i in $(seq 1 15); do
              if curl -fsS http://127.0.0.1:8000/healthz >/dev/null 2>&1; then
                echo "sprintly.service healthy after ${i}s"
                break
              fi
              sleep 1
            done
            curl -fsS http://127.0.0.1:8000/healthz
            echo "Deploy OK: $(git -C ~/Sprntly rev-parse --short HEAD)"
