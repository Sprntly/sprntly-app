name: Deploy backend (staging + prod)

# Dual-target backend deploy.
#   push to main        -> STAGING  (api.staging.sprntly.ai, ~/Sprntly-staging,
#                                     sprintly-staging.service on :8010)
#   push to production  -> PROD     (api.sprntly.ai,        ~/Sprntly,
#                                     sprintly.service on :8000)
# The target environment is resolved from github.ref (see the job-level `env`
# block) and passed into the on-box script via appleboy's `envs:`. Both stacks
# live on the SAME EC2 box. The staging clone (~/Sprntly-staging) has its OWN
# real backend/.env (staging FRONTEND_URL/ALLOWED_ORIGINS), but its Supabase
# URL/keys are repointed at the PROD project so connectors (rows + encrypted
# OAuth tokens) are shared with prod and OAuth callbacks work on staging without
# separate app registration. See BRANCHING.md.
#
# Schema safety: a `migrate` job applies any pending Supabase migrations BEFORE
# the backend restarts, so code never goes live against a schema missing its
# tables. Because staging and prod now share ONE Supabase project (staging
# repointed at prod), the migrate job hits the same DB from either branch — it's
# idempotent (db push only applies migrations not yet recorded), so a staging
# deploy applying a new migration is a no-op when prod later deploys the same
# commit.
#
# Full docs (SUPABASE_DB_URL secret, scripts/apply_migrations.py, backfill):
# supabase/MIGRATIONS.md

on:
  push:
    branches: [main, production]
    paths:
      - 'backend/**'
      - 'supabase/migrations/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  # Separate lanes per environment so a staging deploy never cancels/queues
  # behind a prod deploy (and vice versa).
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

env:
  IS_PROD: ${{ github.ref == 'refs/heads/production' }}
  DEPLOY_BRANCH: ${{ github.ref == 'refs/heads/production' && 'production' || 'main' }}
  CLONE_DIR:     ${{ github.ref == 'refs/heads/production' && 'Sprntly' || 'Sprntly-staging' }}
  SERVICE:       ${{ github.ref == 'refs/heads/production' && 'sprintly' || 'sprintly-staging' }}
  PORT:          ${{ github.ref == 'refs/heads/production' && '8000' || '8010' }}

jobs:
  # Backstop gate: re-run the backend fast lane before touching prod, so a red
  # suite can never migrate the DB or restart the service — even on a direct
  # push to main that bypassed the PR check. Fast lane only (~3-4 min); the
  # integration lane already ran on the PR-to-main. Belt-and-braces with the
  # branch-protection required check (test-backend.yml).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dev requirements
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run pytest (fast lane — no integration tests)
        working-directory: backend
        run: python -m pytest tests/ -q --strict-markers -m "not integration"

  # Apply pending DB migrations first. Gates the deploy: if a migration fails,
  # the backend is NOT restarted onto code that needs it. Runs only after the
  # test job is green so a broken build never mutates the schema.
  migrate:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Apply pending Supabase migrations (db push)
        env:
          # Session-mode pooler connection string from the Supabase dashboard
          # (Settings -> Database -> Connection pooling -> Mode: Session). The
          # GitHub runner is IPv4-only, so the IPv6 direct host can't be used —
          # the pooler is the IPv4 path. SHARED DB: staging is repointed at the
          # prod Supabase project, so BOTH branches migrate the prod DB via
          # SUPABASE_DB_URL. `db push` is idempotent (only applies migrations not
          # yet recorded), so staging applying a new migration is a no-op when
          # prod later deploys the same commit. Restore the
          # `production && SUPABASE_DB_URL || SUPABASE_DB_URL_DEV` split to
          # re-isolate staging's schema later.
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::warning title=Migrations skipped::SUPABASE_DB_URL secret is not set — pending migrations were NOT applied. Add the Session-mode pooler connection string from the Supabase dashboard to enable auto-apply. Until then, prod schema can drift."
            exit 0
          fi
          # --yes: non-interactive. db push compares against the baselined
          # migration history and applies only migrations not yet recorded.
          # --include-all: also apply pending migrations whose version sorts
          # BEFORE the latest already-applied one. Without it, a migration merged
          # with an earlier timestamp than one already on prod (common when two
          # PRs land close together) is "out of order" and `db push` aborts with
          # "Found local migration files to be inserted before the last migration
          # on remote database", blocking the whole deploy. All migration files
          # in the branch are intended to apply, so include-all is the safe default.
          supabase db push --db-url "$SUPABASE_DB_URL" --yes --include-all

  deploy:
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          envs: IS_PROD,DEPLOY_BRANCH,CLONE_DIR,SERVICE,PORT
          script: |
            set -e
            echo "Deploying branch=$DEPLOY_BRANCH -> ~/$CLONE_DIR ($SERVICE on :$PORT, prod=$IS_PROD)"
            cd ~/$CLONE_DIR
            git fetch --quiet origin $DEPLOY_BRANCH
            git reset --hard origin/$DEPLOY_BRANCH
            # Persistent uploads dir lives outside the repo so git resets don't
            # wipe user data. Shared with staging under the same .env for now.
            sudo mkdir -p /var/lib/sprntly/data
            sudo chown -R $(whoami):$(whoami) /var/lib/sprntly
            if [ -d ~/$CLONE_DIR/backend/data/asurion ] && [ ! -d /var/lib/sprntly/data/asurion ]; then
              cp -R ~/$CLONE_DIR/backend/data/asurion /var/lib/sprntly/data/asurion
              echo "Migrated asurion dataset into /var/lib/sprntly/data/"
            fi
            cd backend
            ./.venv/bin/pip install -q -r requirements.txt
            # Install prototype-runtime's npm deps (vite, @vitejs/plugin-react,
            # @babel/parser, @babel/generator, etc.) so storage.py's vite_build()
            # (npx vite build, via a symlinked node_modules — see
            # _symlink_node_modules's own docstring) and autofixer.py's
            # NODE_PATH-based @babel/parser resolution can find them. This is a
            # deterministic install from the committed lockfile — same `npm ci`
            # already used for this exact package in prototype-runtime.yml's CI
            # job and for web/ in deploy-app.yml — so it runs UNCONDITIONALLY on
            # every deploy, like the pip install line above it, NOT existence-
            # gated like the Chromium block below: that block guards an
            # expensive one-time OS-level binary download, whereas skipping a
            # future dependency-version bump here would silently reproduce this
            # exact incident. node_modules is gitignored (both .gitignore:36 and
            # prototype-runtime/.gitignore), so the git reset --hard above does
            # NOT wipe an existing install — steady-state `npm ci` runs
            # incrementally against npm's local cache (~15s measured locally
            # today), not a full reinstall every deploy.
            cd ~/$CLONE_DIR/prototype-runtime
            npm ci --no-audit --no-fund
            cd ~/$CLONE_DIR/backend
            # Provision Playwright's headless Chromium + its OS libraries for the
            # design-agent "Website" design-source extractor. Idempotent + guarded
            # on the browser binary so it only runs on first provision / after a
            # Chromium version bump — a no-op (instant) on normal deploys. The
            # ms-playwright cache is per-user, so staging and prod share it.
            if ! ls ~/.cache/ms-playwright/chromium-*/chrome-linux/chrome >/dev/null 2>&1; then
              echo "Provisioning Chromium for Playwright…"
              sudo dnf install -y -q \
                atk at-spi2-atk at-spi2-core alsa-lib cairo cups-libs libdrm \
                mesa-libgbm pango libX11 libXcomposite libXdamage libXext \
                libXfixes libXrandr libxcb libxkbcommon nss nspr libXrender \
                libXtst libXi libxshmfence
              ./.venv/bin/python -m playwright install chromium
            fi
            # Keep the shared nginx.conf in sync — it holds the server blocks for
            # BOTH environments (api./app. + api.staging./staging.) plus the
            # /_da-bundle, /agent and /mcp locations, so re-apply it on every
            # backend deploy from whichever branch deployed. main and production
            # carry an identical nginx.conf (it flows main->production like all
            # code), so either branch cp'ing it is safe. Validate BEFORE
            # restarting so a bad config fails the deploy here.
            sudo cp ~/$CLONE_DIR/backend/deploy/nginx.conf /etc/nginx/conf.d/sprintly.conf
            sudo nginx -t
            sudo systemctl reload nginx
            # Install a systemd drop-in that extends the stop timeout (graceful
            # drain on deploy). It OVERLAYS only TimeoutStopSec onto the live unit.
            sudo mkdir -p /etc/systemd/system/$SERVICE.service.d
            sudo cp ~/$CLONE_DIR/backend/deploy/sprintly.service.d/timeout.conf /etc/systemd/system/$SERVICE.service.d/timeout.conf
            sudo systemctl daemon-reload
            sudo /bin/systemctl restart $SERVICE
            # Wait up to 15s for FastAPI to bind on the env's port.
            for i in $(seq 1 15); do
              if curl -fsS http://127.0.0.1:$PORT/healthz >/dev/null 2>&1; then
                echo "$SERVICE healthy after ${i}s"
                break
              fi
              sleep 1
            done
            curl -fsS http://127.0.0.1:$PORT/healthz
            echo "Deploy OK ($SERVICE): $(git -C ~/$CLONE_DIR rev-parse --short HEAD)"
